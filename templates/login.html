<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>登入</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; text-align: center; margin-top: 100px; }
        form { display: inline-block; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
        input, button { margin: 10px 0; padding: 10px; width: 250px; font-size: 16px; }
        a { text-decoration: none; color: #007BFF; }
    </style>
    <script>
        window.onload = function () {
            const errMsg = "{{.Error}}";
            if (errMsg && errMsg !== "<no value>") {
                alert(errMsg);
            }
        };
    </script>
</head>
<body>
    <h2>使用者登入</h2>
    <form action="/login" method="POST">
        <input type="text" id="cell_phone" name="cell_phone" placeholder="手機號碼" required><br>
        <input type="password" id="password" name="password" placeholder="密碼" required><br>
        <button type="submit">登入</button>
    </form>
    <p>還沒有帳號？<a href="/register">註冊</a></p>
</body>
</html>
