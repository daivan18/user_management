<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>修改密碼</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; text-align: center; margin-top: 80px; }
        form { display: inline-block; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
        input, button { margin: 10px 0; padding: 10px; width: 250px; font-size: 16px; }
    </style>
</head>
<body>
    <h2>使用者資料維護</h2>
    <form method="POST">
        <label>帳號：{{.Username}}</label><br>
        <label>手機號碼：{{.CellPhone}}</label><br><br>
        <input type="password" name="password" placeholder="新密碼" required><br>
        <input type="password" name="password2" placeholder="再次輸入新密碼" required><br>
        <button type="submit">更新密碼</button>
    </form>
</body>
</html>
